<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foodie's Hub - Home</title>
<style>
body { font-family: Arial; background:#f5f5f5; margin:0; padding:0; }
header { background:#ff5722; color:white; padding:20px; text-align:center; }
header h1 { margin:0; }
.container { width:90%; margin:auto; padding:30px 0; }
.food-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(250px,1fr)); gap:20px; }
.food-card { background:white; border-radius:10px; padding:15px; text-align:center; box-shadow:0 2px 6px rgba(0,0,0,0.1); }
.food-card img { width:100%; height:180px; object-fit:cover; border-radius:10px; }
.food-card h2 { margin:10px 0 5px; font-size:20px; }
.food-card p { color:#ff5722; font-size:18px; margin:5px 0; }
input[type=number] { width:50px; padding:5px; margin:5px 0; }
button { background:#ff5722; color:white; border:none; padding:8px 12px; border-radius:5px; cursor:pointer; }
footer { background:#222; color:white; text-align:center; padding:15px; margin-top:30px; }

header a button {
  font-weight: bold;
  box-shadow: 0 2px 5px rgba(0,0,0,0.3);
}

</style>
</head>
<body>
<header>
<h1>Foodie's Hub</h1>
<p>Order Delicious Food Online</p>

<!-- Go to Cart Button -->
<a href="{{ url_for('cart') }}">
  <button style="background:#ff5722; color:white; border:none; padding:8px 12px; border-radius:5px; cursor:pointer; position:absolute; top:25px; left:20px;">
    Go to Cart
  </button>
</a>
</header>

<div class="container">
<div class="food-grid">

<!-- Food item 1 -->
<div class="food-card">
<img src="{{ item1.img }}" alt="{{ item1.name }}">
<h2>{{ item1.name }}</h2>
<p>₹{{ item1.price }}</p>
<form action="{{ url_for('add_to_cart') }}" method="POST">
<input type="hidden" name="food_name" value="{{ item1.name }}">
<input type="hidden" name="price" value="{{ item1.price }}">
Quantity: <input type="number" name="quantity" value="1" min="1" required><br><br>
<button type="submit">Add to Cart</button>
</form>
</div>

<!-- Food item 2 -->
<div class="food-card">
<img src="{{ item2.img }}" alt="{{ item2.name }}">
<h2>{{ item2.name }}</h2>
<p>₹{{ item2.price }}</p>
<form action="{{ url_for('add_to_cart') }}" method="POST">
<input type="hidden" name="food_name" value="{{ item2.name }}">
<input type="hidden" name="price" value="{{ item2.price }}">
Quantity: <input type="number" name="quantity" value="1" min="1" required><br><br>
<button type="submit">Add to Cart</button>
</form>
</div>

<!-- Food item 3 -->
<div class="food-card">
<img src="{{ item3.img }}" alt="{{ item3.name }}">
<h2>{{ item3.name }}</h2>
<p>₹{{ item3.price }}</p>
<form action="{{ url_for('add_to_cart') }}" method="POST">
<input type="hidden" name="food_name" value="{{ item3.name }}">
<input type="hidden" name="price" value="{{ item3.price }}">
Quantity: <input type="number" name="quantity" value="1" min="1" required><br><br>
<button type="submit">Add to Cart</button>
</form>
</div>

<!-- Food item 4 -->
<div class="food-card">
<img src="{{ item4.img }}" alt="{{ item4.name }}">
<h2>{{ item4.name }}</h2>
<p>₹{{ item4.price }}</p>
<form action="{{ url_for('add_to_cart') }}" method="POST">
<input type="hidden" name="food_name" value="{{ item4.name }}">
<input type="hidden" name="price" value="{{ item4.price }}">
Quantity: <input type="number" name="quantity" value="1" min="1" required><br><br>
<button type="submit">Add to Cart</button>
</form>
</div>

</div>
</div>

<footer>
<p>© 2026 Foodie's Hub | CS Project</p>
</footer>

<script>
  // Function to show toast
  function showToast(message) {
    const toast = document.createElement('div');
    toast.innerText = message;
    toast.style.background = "#4CAF50"; // green
    toast.style.color = "white";
    toast.style.padding = "10px 20px";
    toast.style.marginTop = "10px";
    toast.style.borderRadius = "5px";
    toast.style.boxShadow = "0 2px 6px rgba(0,0,0,0.2)";
    toast.style.opacity = "0";
    toast.style.transition = "opacity 0.5s ease";
    
    document.getElementById('toast-container').appendChild(toast);
    
    // Fade in
    setTimeout(() => { toast.style.opacity = "1"; }, 100);
    
    // Fade out after 2 seconds
    setTimeout(() => { 
      toast.style.opacity = "0"; 
      setTimeout(() => { toast.remove(); }, 500);
    }, 2000);
  }

  // Handle Add-to-Cart forms
  const forms = document.querySelectorAll('.food-card form');

  forms.forEach(form => {
    form.addEventListener('submit', function(e) {
      e.preventDefault(); // Prevent normal form submission

      const formData = new FormData(form);
      const foodName = formData.get('food_name');

      // Send POST request via fetch
      fetch(form.action, {
        method: 'POST',
        body: formData
      })
      .then(response => {
        if (response.ok) {
          showToast(`${foodName} added to cart!`); // Show toast
        } else {
          showToast('Something went wrong.');
        }
      })
      .catch(err => showToast('Error adding to cart.'));
    });
  });
</script>

<!-- Toast Notification Container -->
<div id="toast-container" style="position: fixed; top: 100px; right: 20px; z-index: 9999;"></div>

</body>
</html>
